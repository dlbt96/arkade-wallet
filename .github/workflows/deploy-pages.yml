name: Deploy Web to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-pages.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "packages/web/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Resolve public base path
        id: base-path
        shell: bash
        run: |
          if [ -n "${{ vars.VITE_PUBLIC_BASE_PATH }}" ]; then
            echo "value=${{ vars.VITE_PUBLIC_BASE_PATH }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            echo "value=/" >> "$GITHUB_OUTPUT"
          else
            echo "value=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @arkade-wallet/web build
        env:
          VITE_ARKADE_NETWORK: ${{ vars.VITE_ARKADE_NETWORK }}
          VITE_ARKADE_SERVER_URL: ${{ vars.VITE_ARKADE_SERVER_URL }}
          VITE_BOLTZ_API_URL: ${{ vars.VITE_BOLTZ_API_URL }}
          VITE_ESPLORA_URL: ${{ vars.VITE_ESPLORA_URL }}
          VITE_PUBLIC_BASE_PATH: ${{ steps.base-path.outputs.value }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
